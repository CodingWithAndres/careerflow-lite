<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerFlow Lite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>CareerFlow Lite</h1>
    <p>Track your job applications in one place</p>
  </header>

  <main>

    <!-- Dashboard -->
    <section class="dashboard-section">
      <h2>Application Dashboard</h2>

      <div class="dashboard-grid">
        <div class="stat-card">
          <span>Total</span>
          <strong id="total-count">0</strong>
        </div>

        <div class="stat-card">
          <span>Applied</span>
          <strong id="applied-count">0</strong>
        </div>

        <div class="stat-card">
          <span>Interview</span>
          <strong id="interview-count">0</strong>
        </div>

        <div class="stat-card">
          <span>Offer</span>
          <strong id="offer-count">0</strong>
        </div>

        <div class="stat-card">
          <span>Rejected</span>
          <strong id="rejected-count">0</strong>
        </div>
      </div>
    </section>

    <!-- Form -->
    <section class="form-section">
      <h2>Add Application</h2>

      <form id="appForm">
        <input type="text" id="company" placeholder="Company" required />
        <input type="text" id="role" placeholder="Role" required />
        <input type="date" id="date" required />

        <select id="status" required>
          <option value="Applied">Applied</option>
          <option value="Interview">Interview</option>
          <option value="Offer">Offer</option>
          <option value="Rejected">Rejected</option>
        </select>

        <button type="submit">Add Application</button>
      </form>
    </section>

    <!-- Filters -->
    <section class="filter-section">
      <h2>Filter Applications</h2>

      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="All">All</button>
        <button class="filter-btn" data-filter="Applied">Applied</button>
        <button class="filter-btn" data-filter="Interview">Interview</button>
        <button class="filter-btn" data-filter="Offer">Offer</button>
        <button class="filter-btn" data-filter="Rejected">Rejected</button>
      </div>
    </section>

    <!-- List -->
    <section class="list-section">
      <div class="section-header">
        <h2>Your Applications</h2>
        <button id="clearAllBtn" class="secondary-btn">Clear All</button>
      </div>

      <p id="emptyMessage" class="empty-message">
        No applications yet. Add your first job application above.
      </p>

      <table>
        <thead>
          <tr>
            <th>Company</th>
            <th>Role</th>
            <th>Date</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="appList"></tbody>
      </table>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
